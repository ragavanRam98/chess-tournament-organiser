name: CD — Deploy to Staging / Production

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── Build & Push Docker images ─────────────────────────────────────
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=sha-$(echo ${{ github.sha }} | head -c 7)" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:latest

      - name: Build & push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.worker
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/worker:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/worker:latest

  # ── Deploy to Staging (on push to main) ────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.STAGING_APP_DIR || '/opt/kingsquare' }}

            # Pull latest images
            echo "🔄 Pulling images..."
            docker compose -f docker-compose.prod.yml pull api worker

            # Run database migrations
            echo "🗃 Running migrations..."
            docker compose -f docker-compose.prod.yml run --rm \
              -e DATABASE_URL="${DATABASE_URL}" \
              api npx prisma migrate deploy --schema prisma/schema.prisma

            # Restart services with zero-downtime
            echo "🚀 Restarting services..."
            docker compose -f docker-compose.prod.yml up -d --no-deps api worker

            # Wait for health check
            echo "🏥 Waiting for health check..."
            sleep 5
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:3001/api/v1/health > /dev/null 2>&1; then
                echo "✅ API healthy"
                exit 0
              fi
              echo "  Attempt $i/5 — waiting..."
              sleep 5
            done
            echo "❌ Health check failed after 5 attempts"
            exit 1

  # ── Deploy to Production (on version tag) ──────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: build-push
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.PROD_APP_DIR || '/opt/kingsquare' }}

            # Pull tagged images
            echo "🔄 Pulling images for ${{ github.ref_name }}..."
            docker compose -f docker-compose.prod.yml pull api worker

            # Run database migrations
            echo "🗃 Running production migrations..."
            docker compose -f docker-compose.prod.yml run --rm \
              -e DATABASE_URL="${DATABASE_URL}" \
              api npx prisma migrate deploy --schema prisma/schema.prisma

            # Restart services
            echo "🚀 Deploying ${{ github.ref_name }} to production..."
            docker compose -f docker-compose.prod.yml up -d --no-deps api worker

            # Health check
            echo "🏥 Waiting for health check..."
            sleep 5
            for i in 1 2 3 4 5 6; do
              if curl -sf http://localhost:3001/api/v1/health > /dev/null 2>&1; then
                echo "✅ API healthy — ${{ github.ref_name }} deployed"
                exit 0
              fi
              echo "  Attempt $i/6 — waiting..."
              sleep 5
            done
            echo "❌ Health check failed — rolling back..."
            docker compose -f docker-compose.prod.yml logs --tail=50 api
            exit 1

      - name: Notify deployment
        if: success()
        run: echo "✅ ${{ github.ref_name }} deployed to production"
