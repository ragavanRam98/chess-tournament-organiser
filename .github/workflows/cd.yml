name: CD — Deploy to Staging / Production

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── Build & Push Docker images ─────────────────────────────────────
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=sha-$(echo ${{ github.sha }} | head -c 7)" >> $GITHUB_OUTPUT
          fi

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:latest

      - name: Build & push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/worker:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/worker:latest

  # ── Deploy to Staging (on push to main) ────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Run database migrations
        run: |
          echo "Running: npx prisma migrate deploy"
          # In production, this would SSH into the staging server or use a migration job
          # npx prisma migrate deploy

      - name: Deploy to staging server
        run: |
          echo "Deploying sha-$(echo ${{ github.sha }} | head -c 7) to staging..."
          # In production: docker compose pull && docker compose up -d
          # Or: kubectl set image deployment/api api=$IMAGE:$TAG

  # ── Deploy to Production (on version tag) ──────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: build-push
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Run database migrations
        run: |
          echo "Running production migrations for ${{ github.ref_name }}"
          # npx prisma migrate deploy --schema prisma/schema.prisma

      - name: Deploy to production
        run: |
          echo "Deploying ${{ github.ref_name }} to production..."
          # docker compose -f docker-compose.prod.yml pull
          # docker compose -f docker-compose.prod.yml up -d
