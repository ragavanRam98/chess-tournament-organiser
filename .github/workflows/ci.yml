name: CI — Lint, Test, Build

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ── Lint + Type-check ────────────────────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Type-check (all packages)
        run: npm run type-check

      - name: Lint
        run: npm run lint

  # ── Tests ────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ksuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: ks_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ksuser"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://ksuser:testpass@localhost:5432/ks_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret
      JWT_REFRESH_SECRET: ci-test-refresh-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma db push --skip-generate

      - name: Run API tests
        run: cd apps/api && npx jest --forceExit --passWithNoTests

      - name: Run Worker tests
        run: cd apps/worker && npx jest --forceExit --passWithNoTests

  # ── Docker build (verify image builds) ────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile.api -t ks-api:ci .

      - name: Build Worker image
        run: docker build -f Dockerfile.worker -t ks-worker:ci .
