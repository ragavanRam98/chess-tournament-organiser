events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ─────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{"time_local":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":"$status",'
        '"body_bytes_sent":"$body_bytes_sent",'
        '"request_time":"$request_time",'
        '"upstream_response_time":"$upstream_response_time"}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Performance ─────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain application/json application/javascript text/css;

    # ── Rate limiting ───────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_register:10m rate=3r/s;

    # ── Upstream ────────────────────────────────────────────────────
    upstream api_backend {
        server api:3001;
    }

    server {
        listen 80;
        server_name _;

        # ── Security headers ────────────────────────────────────────
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy strict-origin-when-cross-origin;

        # ── API proxy ────────────────────────────────────────────────
        location /api/v1/ {
            limit_req zone=api_general burst=20 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ── Auth endpoints — stricter rate limit ─────────────────────
        location /api/v1/auth/ {
            limit_req zone=api_auth burst=5 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Registration — strict rate limit (prevent abuse) ─────────
        location /api/v1/registrations {
            limit_req zone=api_register burst=3 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Webhook — no rate limit, but allow only Razorpay IPs ────
        location /api/v1/payments/webhook {
            # Razorpay IP ranges (update from Razorpay docs)
            # allow 52.66.0.0/16;
            # deny all;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Health check ─────────────────────────────────────────────
        location /api/v1/health {
            proxy_pass http://api_backend;
        }

        # ── Metrics (internal only) ──────────────────────────────────
        location /api/v1/metrics {
            # allow 10.0.0.0/8;   # Prometheus scraper
            # deny all;
            proxy_pass http://api_backend;
        }
    }
}
