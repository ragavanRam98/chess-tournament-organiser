# ═══════════════════════════════════════════════════════════════════════════
# docker-compose.prod.yml — Production deployment stack
# Run: docker compose -f docker-compose.prod.yml up -d
# ═══════════════════════════════════════════════════════════════════════════

services:
  # ── API Server ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: chess-api
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "3001"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  # ── Background Worker ──────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: chess-worker
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M

  # ── PostgreSQL (production) ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: chess-postgres-prod
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chess}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-chess_tournament}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chess}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  # ── PgBouncer (connection pooling) ─────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: chess-pgbouncer
    restart: always
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-chess}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-chess_tournament}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "20"
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Redis (production) ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: chess-redis-prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_prod_password} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_prod_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: chess-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api

volumes:
  pgdata_prod:
  redisdata_prod:
