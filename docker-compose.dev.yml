# ═══════════════════════════════════════════════════════════════════════════
# docker-compose.dev.yml — Local development stack
# Run: docker compose -f docker-compose.dev.yml up -d
# ═══════════════════════════════════════════════════════════════════════════

services:
  # ── PostgreSQL 16 ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ks-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chess
      POSTGRES_PASSWORD: chess_dev_password
      POSTGRES_DB: chess_tournament
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess -d chess_tournament"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 (BullMQ) ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ks-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible object storage for R2 dev) ────────────────────
  minio:
    image: minio/minio:latest
    container_name: ks-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  redisdata:
  miniodata:
